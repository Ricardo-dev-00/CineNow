name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        env:
          TMDB_API_KEY_SECRET: ${{ secrets.VITE_TMDB_API_KEY }}
          TMDB_API_KEY_VAR: ${{ vars.VITE_TMDB_API_KEY }}
        run: |
          export VITE_TMDB_API_KEY="${TMDB_API_KEY_SECRET:-$TMDB_API_KEY_VAR}"
          if [ -z "$VITE_TMDB_API_KEY" ]; then
            echo "Erro: defina VITE_TMDB_API_KEY em Secrets ou Variables do repositório."
            exit 1
          fi
          npm run build

      - name: Create SPA fallback
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
